name: Pavilion Runner Test

on:
  workflow_dispatch:    # lets you trigger it manually from the Actions tab
  push:
    branches: [ test-pavilion-runner ]

jobs:
  smoke-test:
    name: Smoke test on Pavilion
    runs-on: [self-hosted, pavilion]
    steps:
      - name: Hello
        run: echo "Hello from $(hostname) on $(uname -srm)"

      - name: Show runner environment
        run: |
          echo "=== System info ==="
          uname -a
          echo
          echo "=== CPU ==="
          lscpu | head -10
          echo
          echo "=== Memory ==="
          free -h
          echo
          echo "=== Disk ==="
          df -h /
          echo
          echo "=== Working directory ==="
          pwd
          ls -la
          echo
          echo "=== Network ==="
          ip -4 addr show | grep inet || true

      - name: Test Docker access
        run: |
          docker version
          docker run --rm hello-world

      - name: Test Python availability via setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run a Python script
        run: |
          python -c "import sys; print(f'Python {sys.version}')"
          python -c "import platform; print(f'Platform: {platform.platform()}')"

      - name: Done
        run: echo "✅ Pavilion runner is working"
